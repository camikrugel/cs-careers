# environment.yml
name: reddit-career-analysis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10

  # Java (for Spark)
  - openjdk=11

  # Big Data
  - pyspark=3.5.0

  # AWS
  - boto3=1.34.0
  - awscli>=1.32.0

  # Data Processing
  - pandas=2.1.0
  - numpy=1.24.0

  # Visualization & Notebook Support
  - matplotlib>=3.8.0
  - seaborn>=0.13.0
  - jupyter>=1.0.0
  - ipython>=8.0.0

  # pip-only packages
  - pip
  - pip:
    - requests>=2.31.0
    - s3fs>=2023.0.0
    - textblob==0.17.1
    - streamlit>=1.28.0
    - plotly>=5.18.0
    - python-dotenv>=1.0.0
