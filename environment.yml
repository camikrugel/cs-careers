# environment.yml
name: reddit-career-analysis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  
  # Java (for Spark)
  - openjdk=11
  
  # Big Data
  - pyspark=3.5.0
  
  # AWS
  - boto3=1.34.0
  - awscli
  
  # Data Processing
  - pandas=2.1.0
  - numpy=1.24.0
  
  # Reddit API
  - pip
  - pip:
    - praw==7.7.1
    - prawcore==2.3.0
    
  # Utilities
  - jupyter
  - ipython
  - matplotlib
  - seaborn